<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basic Calculator</title>
  </head>

  <body>
    <h1>Basic Calculator</h1>

    <input type="number" id="num1" placeholder="First number" />

    <select id="operation">
      <option value="sum">+</option>
      <option value="subtract">-</option>
      <option value="multiply">*</option>
      <option value="divide">/</option>
    </select>

    <input type="number" id="num2" placeholder="Second number" />

    <button type="button" id="btnCalc">Calculate</button>

    <p>Result: <strong id="result">—</strong></p>

    <!-- Load compiled JS files -->
    <script src="sum.js"></script>
    <script src="subtract.js"></script>
    <script src="multiply.js"></script>
    <script src="divide.js"></script>

    <script>
      document.getElementById("btnCalc").addEventListener("click", function () {
        const a = Number(document.getElementById("num1").value);
        const b = Number(document.getElementById("num2").value);
        const operation = document.getElementById("operation").value;

        let result;

        if (operation === "sum") {
          result = window.sum(a, b);
        } 
        
        else if (operation === "subtract") {
          result = window.subtract(a, b);
        } 
        
        else if (operation === "multiply") {
          result = window.multiply(a, b);
        } 
        
        else if (operation === "divide") {
          if (b === 0) {
            result = "Error: division by zero";
          } else {
            result = window.divide(a, b);
          }
        }

        document.getElementById("result").textContent = result;
      });
    </script>
  </body>
</html>
